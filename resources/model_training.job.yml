resources:
  jobs:
    model_training_job:
      name: "[${bundle.target}] TelcoMax - NWDAF Model Training"
      description: "Trains and registers NWDAF congestion predictor and customer conversion scorer to Unity Catalog."

      tasks:
        - task_key: train_congestion_predictor
          description: "Train RandomForest 15-min congestion prediction model"
          spark_python_task:
            python_file: ${workspace.file_path}/src/models/congestion_predictor.py
            source: WORKSPACE
          environment_key: ml_env

        - task_key: train_customer_scorer
          description: "Train GBM customer premium conversion propensity model"
          depends_on:
            - task_key: train_congestion_predictor
          spark_python_task:
            python_file: ${workspace.file_path}/src/models/customer_scorer.py
            source: WORKSPACE
          environment_key: ml_env

      environments:
        - environment_key: ml_env
          spec:
            client: "2"
            dependencies:
              - "numpy>=1.24.0,<2.0"
              - "pandas>=2.0.0"
              - "scikit-learn>=1.3.0"
              - "mlflow>=2.10.0"

      queue:
        enabled: true

      tags:
        demo: "dynamic-network-slicing-live-events"
        layer: "ml-training"
